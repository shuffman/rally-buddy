name: RallyBuddy
options:
  bundleIdPrefix: com.shuffman
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.0.0"
targets:
  RallyBuddy:
    type: application
    platform: iOS
    sources:
      - RallyBuddy
    dependencies:
      - package: MapLibre
    scheme:
      testTargets: []
    entitlements:
      path: RallyBuddy/RallyBuddy.entitlements
      properties:
        com.apple.developer.carplay-driving-task: true
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        PRODUCT_BUNDLE_IDENTIFIER: com.shuffman.rallybuddy
        DEVELOPMENT_TEAM: VC353TUHG2
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: RallyBuddy/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: >-
          Rally Buddy uses your location while you drive to warn you about
          upcoming road features you have marked, such as passing lanes,
          residential zones, and tight corners.
        UIBackgroundModes:
          - audio
          - location
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: RallyBuddy.CarPlaySceneDelegate
        LSSupportsOpeningDocumentsInPlace: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: Rally Buddy Route
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.shuffman.rallybuddy.route
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.shuffman.rallybuddy.route
            UTTypeDescription: Rally Buddy Route
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - rallybuddy
              public.mime-type:
                - application/json
